<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">Iniciar sesión</h1>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <div class="form-group mb-4">
        <label class="form-label">Email</label>
        <input
          formControlName="email"
          type="email"
          class="form-control"
        />
        <div *ngIf="email?.invalid && (email?.dirty || email?.touched)" class="error-text">
          <div *ngIf="email?.hasError('required')">El email es requerido</div>
          <div *ngIf="email?.hasError('email')">Formato inválido.</div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="form-label">Contraseña</label>
        <input
          formControlName="password"
          type="password"
          class="form-control"
        />
        <div *ngIf="password?.invalid && (password?.dirty || password?.touched)" class="error-text">
          <div *ngIf="password?.hasError('required')">La contraseña es requerida</div>
        </div>
      </div>

      <button type="submit" class="btn-login">
        Iniciar sesión
      </button>

    </form>
  </div>
</div>
