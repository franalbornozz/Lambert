<div class="page-container container">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="page-title mb-0">Camiones</h1>

    @if (currentUser?.rol === 'admin') {
      <a routerLink="/camiones/alta" class="btn btn-primary">
        Nuevo Camión
      </a>
    }
  </div>

  <div class="card">
    <div class="card-body p-0">

      @if (camiones.length > 0) {

        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Marca</th>
              <th>Modelo</th>
              <th>Año</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (c of camiones; track c.id) {
              <tr>
                <td>{{ c.marca_camion }}</td>
                <td>{{ c.modelo_camion }}</td>
                <td>{{ c.ano_camion }}</td>
                <td class="text-end">
                  <a
                    class="btn btn-sm btn-secondary"
                    [routerLink]="['/camiones', c.id]"
                    [state]="{ camion: c }">
                    Ver detalle
                  </a>
                </td>
              </tr>
            }
          </tbody>
        </table>

      } @else {

        <div class="empty-state">
          No hay camiones cargados.
        </div>

      }

    </div>
  </div>

</div>
