<div class="page-container container">
  <div class="form-wrapper">
    <h1 class="page-title text-center">Nuevo Camión</h1>

    <form [formGroup]="form" (ngSubmit)="guardar()">
      <!-- Marca -->
      <div class="form-group">
        <label class="form-label">Marca</label>
        <input class="form-control" formControlName="marca_camion" />
      </div>

      <!-- Modelo -->
      <div class="form-group">
        <label class="form-label">Modelo</label>
        <input class="form-control" formControlName="modelo_camion" />
      </div>

      <!-- Año -->
      <div class="form-group">
        <label class="form-label">Año</label>
        <input type="number" class="form-control" formControlName="ano_camion" />
      </div>

      <!-- Tipo -->
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" formControlName="tipo_camion">
          <option value="" disabled>Seleccionar...</option>
          <option value="4x2">4x2</option>
          <option value="6x2">6x2</option>
        </select>
      </div>

      <!-- Configuración -->
      <div class="form-group">
        <label class="form-label">Distancia entre ejes</label>
        <input type="number" class="form-control" formControlName="distancia_entre_ejes" />
      </div>

      <div class="form-group">
        <label class="form-label">Distancia primer eje espalda cabina</label>
        <input type="number" class="form-control" formControlName="distancia_primer_eje_espalda_cabina" />
      </div>

      <div class="form-group">
        <label class="form-label">Voladizo delantero</label>
        <input type="number" class="form-control" formControlName="voladizo_delantero" />
      </div>

      <div class="form-group">
        <label class="form-label">Voladizo trasero</label>
        <input type="number" class="form-control" formControlName="voladizo_trasero" />
      </div>

      <div class="form-group">
        <label class="form-label">Peso eje delantero</label>
        <input type="number" class="form-control" formControlName="peso_eje_delantero" />
      </div>

      <div class="form-group">
        <label class="form-label">Peso eje trasero</label>
        <input type="number" class="form-control" formControlName="peso_eje_trasero" />
      </div>

      <div class="form-group">
        <label class="form-label">PBT</label>
        <input type="number" class="form-control" formControlName="pbt" />
      </div>

      <div class="form-group">
        <label class="form-label">Ancho chasis 1</label>
        <input type="number" class="form-control" formControlName="ancho_chasis_1" />
      </div>

      <div class="form-group">
        <label class="form-label">Ancho chasis 2</label>
        <input type="number" class="form-control" formControlName="ancho_chasis_2" />
      </div>

      <div class="form-actions">
        <a routerLink="/camiones" class="btn btn-secondary">Cancelar</a>
        <!-- Botón siempre habilitado salvo cuando está cargando -->
        <button type="submit" class="btn btn-primary" [disabled]="cargando">Guardar</button>
      </div>
    </form>

    <!-- Bloque de error general -->
    <div *ngIf="error" class="feedback-message feedback-warning mt-3">
      {{ error }}
    </div>
  </div>
</div>
